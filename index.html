document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

0 14px\">¿CUÁNTO RUIDO TIENE TU MARCA HOY?<\u002Fh2>\n      <p style=\"text-align:center;color:#4A5A63;font-weight:600;font-size:15px;margin:0 0 44px\">Marca lo que te suena familiar y mira cómo se ordena tu señal en vivo.<\u002Fp>\n\n      <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:32px;align-items:stretch\">\n\n        <div style=\"border:2px dashed #7B817F;border-radius:16px;padding:32px 28px;background:#FFFFFF;display:flex;flex-direction:column;gap:12px\">\n          <span style=\"font-family:'Archivo Black',sans-serif;font-size:13px;letter-spacing:1.5px;color:#7B817F;margin-bottom:6px\">RUIDO<\u002Fspan>\n          <sc-for list=\"{{ symptoms }}\" as=\"sym\" hint-placeholder-count=\"5\">\n            <div sc-camel-on-click=\"{{ sym.toggle }}\" style=\"{{ sym.boxStyle }}\">\n              <div style=\"{{ sym.checkStyle }}\"><\u002Fdiv>\n              <span style=\"font-weight:600;font-size:14.5px;color:#0C1014\">{{ sym.label }}<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n\n        <div style=\"background:#37464D;border-radius:16px;padding:32px 28px;display:flex;flex-direction:column;gap:20px;justify-content:center\">\n          <span style=\"font-family:'Archivo Black',sans-serif;font-size:13px;letter-spacing:1.5px;color:#F0DCC9;margin-bottom:2px\">SEÑAL<\u002Fspan>\n          <div>\n            <div style=\"display:flex;justify-content:space-between;font-weight:700;font-size:13px;color:#F0DCC9;opacity:.7;margin-bottom:6px\"><span>RUIDO ACTUAL<\u002Fspan><span>{{ ruidoLabel }}<\u002Fspan><\u002Fdiv>\n            <div style=\"height:16px;background:rgba(240,220,201,.15);border-radius:8px;overflow:hidden\"><div style=\"{{ ruidoBarStyle }}\"><\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n          <div>\n            <div style=\"display:flex;justify-content:space-between;font-weight:700;font-size:13px;color:#F0DCC9;margin-bottom:6px\"><span>SEÑAL CON OUTLINE<\u002Fspan><span>{{ senalLabel }}<\u002Fspan><\u002Fdiv>\n            <div style=\"height:16px;background:rgba(240,220,201,.15);border-radius:8px;overflow:hidden\"><div style=\"{{ senalBarStyle }}\"><\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n          <span style=\"color:#F0DCC9;opacity:.75;font-weight:600;font-size:13px;line-height:1.5;margin-top:4px\">Marca síntomas a la izquierda y mira cómo se ordena la señal.<\u002Fspan>\n        <\u002Fdiv>\n\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ================= SERVICIOS ================= -->\n  <section id=\"servicios\" ref=\"{{ servicesRef }}\" style=\"padding:110px 60px 100px;background:#F0DCC9\">\n    <div style=\"max-width:1180px;margin:0 auto\">\n      <span style=\"display:block;text-align:center;color:#7B817F;font-weight:700;font-size:13px;letter-spacing:2px;margin-bottom:10px\">QUÉ HACEMOS<\u002Fspan>\n      <h2 style=\"font-family:'Archivo Black',sans-serif;font-size:34px;color:#0C1014;text-align:center;margin:0 0 60px\">CUATRO FRENTES, UNA SOLA VOZ<\u002Fh2>\n      <div style=\"display:grid;grid-template-columns:repeat(4,1fr);gap:24px\">\n        <sc-for list=\"{{ services }}\" as=\"svc\" hint-placeholder-count=\"4\">\n          <div style=\"{{ svc.cardStyle }}\" sc-camel-on-mouse-enter=\"{{ svc.onEnter }}\" sc-camel-on-mouse-leave=\"{{ svc.onLeave }}\">\n            <div style=\"{{ svc.ringStyle }}\">\n              <sc-if value=\"{{ svc.isTarget }}\" hint-placeholder-val=\"{{ false }}\">\n                <div style=\"width:16px;height:16px;border-radius:50%;background:{{ svc.glyphColor }}\"><\u002Fdiv>\n              <\u002Fsc-if>\n              <sc-if value=\"{{ svc.isChat }}\" hint-placeholder-val=\"{{ false }}\">\n                <div style=\"width:18px;height:14px;border:2px solid {{ svc.glyphColor }};border-radius:5px 5px 5px 0\"><\u002Fdiv>\n              <\u002Fsc-if>\n              <sc-if value=\"{{ svc.isCalendar }}\" hint-placeholder-val=\"{{ false }}\">\n                <div style=\"position:relative;width:18px;height:16px;border:2px solid {{ svc.glyphColor }};border-radius:2px\">\n                  <div style=\"position:absolute;top:2px;left:0;right:0;height:2px;background:{{ svc.glyphColor }}\"><\u002Fdiv>\n                  <div style=\"position:absolute;top:-4px;left:3px;width:2px;height:5px;background:{{ svc.glyphColor }}\"><\u002Fdiv>\n                  <div style=\"position:absolute;top:-4px;right:3px;width:2px;height:5px;background:{{ svc.glyphColor }}\"><\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-if>\n              <sc-if value=\"{{ svc.isGrowth }}\" hint-placeholder-val=\"{{ false }}\">\n                <div style=\"display:flex;align-items:flex-end;gap:2px;height:18px\">\n                  <div style=\"width:4px;height:8px;background:{{ svc.glyphColor }}\"><\u002Fdiv>\n                  <div style=\"width:4px;height:13px;background:{{ svc.glyphColor }}\"><\u002Fdiv>\n                  <div style=\"width:4px;height:18px;background:{{ svc.glyphColor }}\"><\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-if>\n            <\u002Fdiv>\n            <h3 style=\"font-family:'Archivo Black',sans-serif;font-size:17px;color:#F0DCC9;margin:0 0 12px;letter-spacing:.5px\">{{ svc.title }}<\u002Fh3>\n            <p style=\"color:#C7CBC9;font-size:14px;line-height:1.6;margin:0;font-weight:500\">{{ svc.desc }}<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ================= COMO TRABAJAMOS ================= -->\n  <section ref=\"{{ comoRef }}\" style=\"padding:110px 60px;background:#4A5A63\">\n    <div style=\"max-width:960px;margin:0 auto\">\n      <span style=\"display:block;text-align:center;color:#F0DCC9;opacity:.75;font-weight:700;font-size:13px;letter-spacing:2px;margin-bottom:10px;{{ comoTextStyle }}\">CÓMO TRABAJAMOS<\u002Fspan>\n      <h2 style=\"font-family:'Archivo Black',sans-serif;font-size:32px;color:#F0DCC9;text-align:center;margin:0 0 60px;{{ comoTextStyle }}\">TRES PASOS, SIN VUELTAS<\u002Fh2>\n      <div style=\"display:flex;align-items:center;justify-content:center;gap:10px;flex-wrap:wrap\">\n\n        <div style=\"display:flex;flex-direction:column;align-items:center;gap:12px;max-width:180px;text-align:center\">\n          <div style=\"position:relative;width:56px;height:56px\">\n            <svg width=\"56\" height=\"56\" style=\"position:absolute;top:0;left:0;transform:rotate(-90deg)\">\n              <circle cx=\"28\" cy=\"28\" r=\"26\" fill=\"none\" stroke=\"#F0DCC9\" stroke-width=\"2.5\" style=\"{{ circle1Style }}\"><\u002Fcircle>\n            <\u002Fsvg>\n            <div style=\"position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:'Archivo Black',sans-serif;font-size:22px;color:#F0DCC9\">{{ step1Number }}<\u002Fdiv>\n          <\u002Fdiv>\n          <span style=\"display:block;font-family:'Archivo Black',sans-serif;font-size:15px;color:#FFFFFF;text-align:center;{{ comoTextStyle }}\">AUDITORÍA<\u002Fspan>\n          <span style=\"display:block;color:#F0DCC9;opacity:.85;font-weight:600;font-size:13.5px;line-height:1.5;text-align:center;{{ comoTextStyle }}\">Revisamos dónde está el ruido, gratis.<\u002Fspan>\n        <\u002Fdiv>\n\n        <svg width=\"46\" height=\"10\" sc-camel-view-box=\"0 0 46 10\" style=\"flex:0 0 auto\">\n          <line x1=\"2\" y1=\"5\" x2=\"44\" y2=\"5\" stroke=\"#F0DCC9\" stroke-width=\"2.5\" style=\"{{ arrow1Style }}\"><\u002Fline>\n        <\u002Fsvg>\n\n        <div style=\"display:flex;flex-direction:column;align-items:center;gap:12px;max-width:180px;text-align:center\">\n          <div style=\"position:relative;width:56px;height:56px\">\n            <svg width=\"56\" height=\"56\" style=\"position:absolute;top:0;left:0;transform:rotate(-90deg)\">\n              <circle cx=\"28\" cy=\"28\" r=\"26\" fill=\"none\" stroke=\"#F0DCC9\" stroke-width=\"2.5\" style=\"{{ circle2Style }}\"><\u002Fcircle>\n            <\u002Fsvg>\n            <div style=\"position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:'Archivo Black',sans-serif;font-size:22px;color:#F0DCC9\">{{ step2Number }}<\u002Fdiv>\n          <\u002Fdiv>\n          <span style=\"display:block;font-family:'Archivo Black',sans-serif;font-size:15px;color:#FFFFFF;text-align:center;{{ comoTextStyle }}\">ESTRATEGIA<\u002Fspan>\n          <span style=\"display:block;color:#F0DCC9;opacity:.85;font-weight:600;font-size:13.5px;line-height:1.5;text-align:center;{{ comoTextStyle }}\">Una sola propuesta de valor y un plan editorial.<\u002Fspan>\n        <\u002Fdiv>\n\n        <svg width=\"46\" height=\"10\" sc-camel-view-box=\"0 0 46 10\" style=\"flex:0 0 auto\">\n          <line x1=\"2\" y1=\"5\" x2=\"44\" y2=\"5\" stroke=\"#F0DCC9\" stroke-width=\"2.5\" style=\"{{ arrow2Style }}\"><\u002Fline>\n        <\u002Fsvg>\n\n        <div style=\"display:flex;flex-direction:column;align-items:center;gap:12px;max-width:180px;text-align:center\">\n          <div style=\"position:relative;width:56px;height:56px\">\n            <svg width=\"56\" height=\"56\" style=\"position:absolute;top:0;left:0;transform:rotate(-90deg)\">\n              <circle cx=\"28\" cy=\"28\" r=\"26\" fill=\"none\" stroke=\"#F0DCC9\" stroke-width=\"2.5\" style=\"{{ circle3Style }}\"><\u002Fcircle>\n            <\u002Fsvg>\n            <div style=\"position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:'Archivo Black',sans-serif;font-size:22px;color:#F0DCC9\">{{ step3Number }}<\u002Fdiv>\n          <\u002Fdiv>\n          <span style=\"display:block;font-family:'Archivo Black',sans-serif;font-size:15px;color:#FFFFFF;text-align:center;{{ comoTextStyle }}\">EJECUCIÓN MENSUAL<\u002Fspan>\n          <span style=\"display:block;color:#F0DCC9;opacity:.85;font-weight:600;font-size:13.5px;line-height:1.5;text-align:center;{{ comoTextStyle }}\">Contenido y gestión sostenidos en el tiempo.<\u002Fspan>\n        <\u002Fdiv>\n\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ================= FAQ ================= -->\n  <section style=\"padding:110px 60px;background:#F0DCC9\">\n    <div style=\"max-width:760px;margin:0 auto\">\n      <span style=\"display:block;text-align:center;color:#7B817F;font-weight:700;font-size:13px;letter-spacing:2px;margin-bottom:10px\">PREGUNTAS FRECUENTES<\u002Fspan>\n      <h2 style=\"font-family:'Archivo Black',sans-serif;font-size:32px;color:#0C1014;text-align:center;margin:0 0 50px\">ANTES QUE PREGUNTES<\u002Fh2>\n      <div style=\"display:flex;flex-direction:column;gap:12px\">\n        <sc-for list=\"{{ faqs }}\" as=\"faq\" hint-placeholder-count=\"4\">\n          <div style=\"border:2px solid #0C1014;border-radius:14px;background:#FFFFFF\">\n            <div sc-camel-on-click=\"{{ faq.toggle }}\" style=\"display:flex;justify-content:space-between;align-items:center;padding:18px 22px;cursor:pointer\">\n              <span style=\"font-family:'Archivo Black',sans-serif;font-size:14.5px;color:#0C1014\">{{ faq.question }}<\u002Fspan>\n              <span style=\"font-family:'Archivo Black',sans-serif;font-size:18px;color:#4A5A63\">{{ faq.marker }}<\u002Fspan>\n            <\u002Fdiv>\n            <sc-if value=\"{{ faq.open }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"padding:0 22px 20px;color:#37464D;font-weight:600;font-size:14px;line-height:1.6\">{{ faq.answer }}<\u002Fdiv>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ================= EQUIPO ================= -->\n  <section id=\"equipo\" ref=\"{{ teamRef }}\" style=\"padding:110px 60px;background:#4A5A63\">\n    <div style=\"max-width:1100px;margin:0 auto\">\n      <span style=\"display:block;text-align:center;color:#F0DCC9;opacity:.75;font-weight:700;font-size:13px;letter-spacing:2px;margin-bottom:10px\">EQUIPO<\u002Fspan>\n      <h2 style=\"font-family:'Archivo Black',sans-serif;font-size:32px;color:#F0DCC9;text-align:center;margin:0 0 12px\">RESPALDO EDITORIAL, NO SOLO REDES<\u002Fh2>\n      <p style=\"text-align:center;color:#F0DCC9;opacity:.8;font-weight:600;font-size:15px;margin:0 0 54px\">Fundado por periodistas de la Universidad de Chile.<\u002Fp>\n      <div style=\"display:grid;grid-template-columns:repeat(2,minmax(0,320px));gap:40px;justify-content:center\">\n        <sc-for list=\"{{ team }}\" as=\"member\" hint-placeholder-count=\"2\">\n          <div style=\"display:flex;flex-direction:column;align-items:center;text-align:center;gap:10px\">\n            <div style=\"border:2px dashed #F0DCC9;border-radius:50%;padding:6px\">\n              <img src=\"{{ member.photoUrl }}\" alt=\"{{ member.name }}\" style=\"width:128px;height:128px;border-radius:50%;object-fit:cover;display:block\">\n            <\u002Fdiv>\n            <span style=\"font-family:'Archivo Black',sans-serif;font-size:15px;color:#FFFFFF;margin-top:6px\">{{ member.name }}<\u002Fspan>\n            <span style=\"color:#F0DCC9;opacity:.85;font-weight:600;font-size:13px;max-width:260px\">{{ member.role }}<\u002Fspan>\n            <span style=\"background:#F0DCC9;color:#37464D;font-weight:700;font-size:10.5px;padding:4px 10px;border-radius:10px;letter-spacing:.3px\">PERIODISTA U. CHILE<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ================= CTA + FORM ================= -->\n  <section id=\"contacto\" style=\"padding:120px 60px;background:#4A5A63\">\n    <div style=\"max-width:640px;margin:0 auto;text-align:center\">\n      <h2 style=\"font-family:'Archivo Black',sans-serif;font-size:36px;color:#F0DCC9;margin:0 0 16px;letter-spacing:.5px\">ESCRÍBENOS Y RECIBE TU AUDITORÍA GRATIS<\u002Fh2>\n      <p style=\"color:#F0DCC9;opacity:.85;font-weight:600;font-size:15px;margin:0 0 40px\">Te contamos qué vemos, aunque no te guste.<\u002Fp>\n      <form sc-camel-on-submit=\"{{ handleSubmit }}\" style=\"display:flex;flex-direction:column;gap:14px;text-align:left\">\n        <input placeholder=\"Nombre\" style=\"padding:14px 16px;border:2px solid #F0DCC9;border-radius:10px;background:transparent;color:#F0DCC9;font-family:'Quicksand',sans-serif;font-weight:600;font-size:14px\">\n        <input placeholder=\"Email\" type=\"email\" style=\"padding:14px 16px;border:2px solid #F0DCC9;border-radius:10px;background:transparent;color:#F0DCC9;font-family:'Quicksand',sans-serif;font-weight:600;font-size:14px\">\n        <textarea placeholder=\"Cuéntanos qué te está pasando\" rows=\"3\" style=\"padding:14px 16px;border:2px solid #F0DCC9;border-radius:10px;background:transparent;color:#F0DCC9;font-family:'Quicksand',sans-serif;font-weight:600;font-size:14px;resize:vertical\"><\u002Ftextarea>\n        <button type=\"submit\" style=\"margin-top:8px;background:#F0DCC9;color:#4A5A63;font-weight:700;font-size:15px;padding:15px;border-radius:10px;border:none;cursor:pointer;font-family:'Quicksand',sans-serif\" style-hover=\"background:#FFFFFF\">QUIERO MI AUDITORÍA<\u002Fbutton>\n      <\u002Fform>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <footer style=\"background:#37464D;padding:64px 60px 0\">\n    <div style=\"max-width:1180px;margin:0 auto;display:flex;justify-content:space-between;flex-wrap:wrap;gap:48px;padding-bottom:44px;border-bottom:1px solid rgba(240,220,201,.2)\">\n\n      <div style=\"display:flex;flex-direction:column;gap:16px;max-width:280px\">\n        <div style=\"display:flex;flex-direction:column;line-height:1\">\n          <span style=\"font-family:'Archivo Black',sans-serif;font-size:22px;color:#37464D;-webkit-text-stroke:1.75px #F0DCC9;letter-spacing:1px\">OUTLINE<\u002Fspan>\n          <span style=\"font-family:'Archivo Black',sans-serif;font-size:11px;color:#F0DCC9;letter-spacing:2px;margin-top:3px\">COMUNICACIONES<\u002Fspan>\n        <\u002Fdiv>\n        <span style=\"color:#F0DCC9;opacity:.75;font-weight:600;font-size:13.5px\">Todo parte desde el contorno.<\u002Fspan>\n        <div style=\"display:flex;gap:10px;margin-top:6px\">\n          <a href=\"https://www.instagram.com/outlinecomunicaciones\" target=\"_blank\" rel=\"noopener\" style=\"width:32px;height:32px;border:1.5px solid #F0DCC9;border-radius:8px;display:flex;align-items:center;justify-content:center\" style-hover=\"background:rgba(240,220,201,.12)\">\n            <div style=\"width:12px;height:12px;border:1.5px solid #F0DCC9;border-radius:50%\"><\u002Fdiv>\n          <\u002Fa>\n          <a href=\"https://www.linkedin.com/company/outline-comunicaciones\" target=\"_blank\" rel=\"noopener\" style=\"width:32px;height:32px;border:1.5px solid #F0DCC9;border-radius:8px;display:flex;align-items:center;justify-content:center;color:#F0DCC9;font-weight:700;font-size:12px;font-family:'Quicksand',sans-serif;text-decoration:none\" style-hover=\"background:rgba(240,220,201,.12)\">in<\u002Fa>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <nav style=\"display:flex;flex-direction:column;gap:12px\">\n        <span style=\"color:#7B817F;font-weight:700;font-size:12px;letter-spacing:1.5px;margin-bottom:4px\">NAVEGACIÓN<\u002Fspan>\n        <a href=\"#servicios\" style=\"color:#F0DCC9;text-decoration:none;font-weight:600;font-size:14px\" style-hover=\"color:#FFFFFF\">Servicios<\u002Fa>\n        <a href=\"https://outlinecomunicaciones.com/casos-de-exito/\" target=\"_top\" style=\"color:#F0DCC9;text-decoration:none;font-weight:600;font-size:14px\" style-hover=\"color:#FFFFFF\">Casos<\u002Fa>\n        <a href=\"#equipo\" style=\"color:#F0DCC9;text-decoration:none;font-weight:600;font-size:14px\" style-hover=\"color:#FFFFFF\">Nosotros<\u002Fa>\n        <a href=\"#contacto\" style=\"color:#F0DCC9;text-decoration:none;font-weight:600;font-size:14px\" style-hover=\"color:#FFFFFF\">Contacto<\u002Fa>\n      <\u002Fnav>\n    <\u002Fdiv>\n\n    <div style=\"max-width:1180px;margin:0 auto;display:flex;justify-content:space-between;flex-wrap:wrap;gap:12px;padding:22px 0\">\n      <span style=\"color:#F0DCC9;opacity:.6;font-weight:600;font-size:12.5px\">© 2026 Outline Comunicaciones<\u002Fspan>\n      <div style=\"display:flex;gap:22px\">\n        <a href=\"https://outlinecomunicaciones.com/privacidad/\" target=\"_top\" style=\"color:#F0DCC9;opacity:.6;text-decoration:none;font-weight:600;font-size:12.5px\" style-hover=\"opacity:1\">Privacidad<\u002Fa>\n        <a href=\"https://outlinecomunicaciones.com/terminos/\" target=\"_top\" style=\"color:#F0DCC9;opacity:.6;text-decoration:none;font-weight:600;font-size:12.5px\" style-hover=\"opacity:1\">Términos<\u002Fa>\n        <a href=\"https://outlinecomunicaciones.com/cookies/\" target=\"_top\" style=\"color:#F0DCC9;opacity:.6;text-decoration:none;font-weight:600;font-size:12.5px\" style-hover=\"opacity:1\">Cookies<\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Ffooter>\n\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = {\n    revealed: { hero: false, services: false, diag: false, team: false },\n    selected: {},\n    hoveredService: null,\n    openFaq: null,\n    socialCounts: { seguidores: 0, sesiones: 0, meses: 0 },\n    comoT: 0,\n  };\n\n  socialTargets = { seguidores: 500, sesiones: 250, meses: 7 };\n  comoTimeline = { c1: [0, 350], a1: [350, 600], c2: [600, 950], a2: [950, 1200], c3: [1200, 1550] };\n\n  servicesData = [\n    { id: 's1', title: 'ESTRATEGIA DIGITAL', desc: 'Definimos una sola propuesta de valor y un plan editorial que la sostenga.', icon: 'target' },\n    { id: 's2', title: 'CONTENIDO QUE CONECTA', desc: 'Piezas con voz propia, escritas por periodistas, no por plantillas.', icon: 'chat' },\n    { id: 's3', title: 'GESTIÓN DE REDES', desc: 'Calendario, comunidad y respuesta al día, sin perder consistencia.', icon: 'calendar' },\n    { id: 's4', title: 'CRECIMIENTO Y OPTIMIZACIÓN', desc: 'Medimos señal real: qué mueve la aguja y qué es solo ruido.', icon: 'growth' },\n  ];\n\n  symptomsData = [\n    { id: 'p1', label: 'Público sin estrategia clara' },\n    { id: 'p2', label: 'Nadie sabe qué hace tu marca' },\n    { id: 'p3', label: 'Cada red dice algo distinto' },\n    { id: 'p4', label: 'No tienes datos, solo intuición' },\n    { id: 'p5', label: 'Contenido genérico, sin voz propia' },\n  ];\n\n  teamData = [\n    { slotId: 'team-antonio', name: 'Antonio Sotelo Pereira', role: 'Voz y comunidad', photoUrl: 'https://outlinecomunicaciones.com/wp-content/uploads/2026/03/antonio-sotelo.jpg-e1774463594440.jpeg' },\n    { slotId: 'team-andres', name: 'Andrés Cepeda Ramírez', role: 'Estrategia y contenido', photoUrl: 'https://outlinecomunicaciones.com/wp-content/uploads/2026/03/whatsapp-image-2026-03-25-at-3.26.42-pm-1-e1774463495446.jpeg' },\n  ];\n\n  faqsData = [\n    { id: 'f1', question: '¿Cuánto cuesta el servicio?', answer: 'Trabajamos con un plan integral mensual que junta los 4 servicios — no vendemos servicios sueltos. El valor depende del volumen y la complejidad de tu marca, y se define después de la auditoría gratuita.' },\n    { id: 'f2', question: '¿Cuánto tarda en verse resultado?', answer: 'Los primeros cambios se ven en semanas. Resultados medibles, como los que hemos obtenido con otras marcas, toman meses de trabajo sostenido.' },\n    { id: 'f3', question: '¿Trabajan con mi rubro?', answer: 'Sí, con distintos rubros. En la etapa de auditoría inicial evaluamos si tu caso calza con nuestra forma de trabajar — y si no calza, te lo decimos ahí mismo.' },\n    { id: 'f4', question: '¿Qué incluye la auditoría gratis?', answer: 'Una revisión de tu presencia actual, dónde está el ruido y una primera hipótesis de estrategia — sin costo ni compromiso.' },\n  ];\n\n  componentDidMount() {\n    this._nodes = {};\n    this._onScroll = () => this.checkReveals();\n    window.addEventListener('scroll', this._onScroll, { passive: true });\n    window.addEventListener('resize', this._onScroll, { passive: true });\n    this._pollTimer = setInterval(this._onScroll, 300);\n    setTimeout(this._onScroll, 50);\n    this._animTimer = setInterval(() => this.tickAnimations(), 16);\n  }\n\n  componentWillUnmount() {\n    window.removeEventListener('scroll', this._onScroll);\n    window.removeEventListener('resize', this._onScroll);\n    clearInterval(this._pollTimer);\n    clearInterval(this._animTimer);\n  }\n\n  checkReveals() {\n    if (!this._nodes) return;\n    const vh = window.innerHeight || 800;\n    Object.keys(this._nodes).forEach((key) => {\n      const node = this._nodes[key];\n      if (!node || !node.isConnected) return;\n      const rect = node.getBoundingClientRect();\n      const visibleH = Math.min(rect.bottom, vh) - Math.max(rect.top, 0);\n      const ratio = Math.max(0, visibleH) / Math.max(1, Math.min(rect.height, vh));\n      const intersecting = ratio >= 0.18;\n      const replayable = key === 'social' || key === 'como';\n      if (intersecting) {\n        if (!this.state.revealed[key]) this.setState((s) => ({ revealed: { ...s.revealed, [key]: true } }));\n        if (replayable && !this['_' + key + 'Running']) {\n          this['_' + key + 'Running'] = true;\n          if (key === 'social') this.startSocialCount();\n          if (key === 'como') this.startComoAnim();\n        }\n      } else if (replayable && this['_' + key + 'Running']) {\n        this['_' + key + 'Running'] = false;\n        if (key === 'social') { this._socialStart = null; this.setState({ socialCounts: { seguidores: 0, sesiones: 0, meses: 0 } }); }\n        if (key === 'como') { this._comoStart = null; this.setState({ comoT: 0 }); }\n      }\n    });\n  }\n\n  makeReveal(key) {\n    return (node) => {\n      if (!this._nodes) this._nodes = {};\n      if (node) {\n        this._nodes[key] = node;\n        setTimeout(() => this.checkReveals(), 50);\n      } else {\n        delete this._nodes[key];\n      }\n    };\n  }\n\n  startSocialCount() {\n    this._socialStart = performance.now();\n  }\n\n  startComoAnim() {\n    this._comoStart = performance.now();\n  }\n\n  tickAnimations() {\n    const now = performance.now();\n    if (this._comoStart != null) {\n      const t = Math.min(1550, now - this._comoStart);\n      if (t !== this.state.comoT) this.setState({ comoT: t });\n    }\n    if (this._socialStart != null) {\n      const duration = 1300;\n      const tt = Math.min(1, (now - this._socialStart) / duration);\n      const eased = 1 - Math.pow(1 - tt, 3);\n      const targets = this.socialTargets;\n      const next = {\n        seguidores: Math.round(targets.seguidores * eased),\n        sesiones: Math.round(targets.sesiones * eased),\n        meses: Math.round(targets.meses * eased),\n      };\n      const cur = this.state.socialCounts;\n      if (cur.seguidores !== next.seguidores || cur.sesiones !== next.sesiones || cur.meses !== next.meses) {\n        this.setState({ socialCounts: next });\n      }\n    }\n  }\n\n  toggleSymptom(id) {\n    this.setState((s) => ({ selected: { ...s.selected, [id]: !s.selected[id] } }));\n  }\n\n  handleSubmit(e) { e.preventDefault(); var f=e.target; var d={nombre:f[0].value,email:f[1].value,mensaje:f[2].value,_subject:'Nueva solicitud de auditoria - web outline',_cc:'a.k.sotelo.as@gmail.com,andres.cepeda@ug.uchile.cl,contacto@outlinecomunicaciones.com'}; if(!d.nombre||!d.email){alert('Completa tu nombre y email para poder responderte.');return;} fetch('https://formsubmit.co/ajax/comunicacion.outline@gmail.com',{method:'POST',headers:{'Content-Type':'application/json','Accept':'application/json'},body:JSON.stringify(d)}).then(function(){f.reset();alert('Listo, recibimos tu solicitud. Te contactamos pronto.');}).catch(function(){alert('Hubo un problema al enviar. Escribenos directo a comunicacion.outline@gmail.com');}); }\n\n  toggleFaq(id) {\n    this.setState((s) => ({ openFaq: s.openFaq === id ? null : id }));\n  }\n\n  renderVals() {\n    const { revealed, selected, hoveredService, openFaq, socialCounts, comoT } = this.state;\n\n    const prog = ([s, e]) => (comoT <= s ? 0 : comoT >= e ? 1 : (comoT - s) / (e - s));\n    const circumference = 2 * Math.PI * 26;\n    const arrowLen = 42;\n    const circleStyle = (p) => ({ strokeDasharray: `${circumference}`, strokeDashoffset: `${circumference * (1 - p)}` });\n    const arrowStyle = (p) => ({ strokeDasharray: `${arrowLen}`, strokeDashoffset: `${arrowLen * (1 - p)}` });\n    const p1 = prog(this.comoTimeline.c1), pa1 = prog(this.comoTimeline.a1);\n    const p2 = prog(this.comoTimeline.c2), pa2 = prog(this.comoTimeline.a2);\n    const p3 = prog(this.comoTimeline.c3);\n    const comoTextStyle = `opacity:${revealed.como ? 1 : 0};transform:translateY(${revealed.como ? 0 : 18}px);transition:opacity .4s ease-out, transform .4s ease-out`;\n    const selectedCount = Object.values(selected).filter(Boolean).length;\n    const ruidoPct = selectedCount > 0 ? Math.round((selectedCount / this.symptomsData.length) * 100) : 0;\n    const senalPct = selectedCount > 0 ? 92 : 0;\n\n    const revealStyle = (visible, extra) => ({\n      opacity: visible ? 1 : 0,\n      transform: visible ? 'translateY(0)' : 'translateY(18px)',\n      transition: 'opacity .4s ease-out, transform .4s ease-out',\n      ...extra,\n    });\n\n    const chip = (top, left, rot, visible) => ({\n      position: 'absolute', top, left,\n      padding: '6px 14px', borderRadius: 10, fontWeight: 700, fontSize: 11,\n      fontFamily: \"'Quicksand',sans-serif\", zIndex: 1,\n      border: visible ? '1px solid rgba(240,220,201,0)' : '1px solid #F0DCC9',\n      color: visible ? 'transparent' : '#F0DCC9',\n      opacity: visible ? 0 : 1,\n      transform: `rotate(${rot}deg) ${visible ? 'translateY(-10px) scale(.9)' : 'translateY(0) scale(1)'}`,\n      transition: 'opacity .5s ease-out, transform .5s ease-out',\n    });\n\n    const services = this.servicesData.map((svc, i) => {\n      const hovered = hoveredService === svc.id;\n      return {\n        title: svc.title,\n        desc: svc.desc,\n        isTarget: svc.icon === 'target',\n        isChat: svc.icon === 'chat',\n        isCalendar: svc.icon === 'calendar',\n        isGrowth: svc.icon === 'growth',\n        glyphColor: hovered ? '#37464D' : '#F0DCC9',\n        ringStyle: {\n          width: 44, height: 44, borderRadius: '50%', display: 'flex', alignItems: 'center', justifyContent: 'center',\n          marginBottom: 20, border: '2px solid #F0DCC9',\n          background: hovered ? '#F0DCC9' : 'transparent',\n          transition: 'background .2s ease-out',\n        },\n        onEnter: () => this.setState({ hoveredService: svc.id }),\n        onLeave: () => this.setState({ hoveredService: null }),\n        cardStyle: {\n          background: hovered ? '#37464D' : '#37464D',\n          border: revealed.services ? '2px solid #7B817F' : '2px dashed #7B817F',\n          borderRadius: 16,\n          padding: '28px 22px',\n          cursor: 'default',\n          transition: 'background .2s ease-out, transform .2s ease-out, box-shadow .2s ease-out, opacity .5s ease-out',\n          opacity: revealed.services ? 1 : 0,\n          transform: revealed.services ? (hovered ? 'translateY(-6px)' : 'translateY(0)') : 'translateY(24px)',\n          boxShadow: hovered ? '0 16px 32px rgba(12,16,20,.25)' : 'none',\n          transitionDelay: revealed.services ? `${i * 90}ms` : '0ms',\n        },\n      };\n    });\n\n    const noiseRot = [-2, 1.5, -1, 2, -1.5];\n    const symptoms = this.symptomsData.map((sym, i) => {\n      const on = !!selected[sym.id];\n      return {\n        label: sym.label,\n        toggle: () => this.toggleSymptom(sym.id),\n        boxStyle: {\n          display: 'flex', alignItems: 'center', gap: 12, padding: '14px 16px',\n          border: on ? '2px solid #4A5A63' : '2px dashed #7B817F',\n          background: on ? '#F0DCC9' : '#FFFFFF',\n          borderRadius: 10, cursor: 'pointer',\n          transform: `rotate(${on ? 0 : noiseRot[i % noiseRot.length]}deg)`,\n          transition: 'all .3s ease-out',\n        },\n        checkStyle: {\n          width: 18, height: 18, borderRadius: 4, flex: '0 0 auto',\n          border: '2px solid #4A5A63',\n          background: on ? '#4A5A63' : 'transparent',\n        },\n      };\n    });\n\n    const team = this.teamData.map((m) => ({ slotId: m.slotId, name: m.name, role: m.role, photoUrl: m.photoUrl }));\n\n    const faqs = this.faqsData.map((faq) => {\n      const open = openFaq === faq.id;\n      return {\n        question: faq.question,\n        answer: faq.answer,\n        open,\n        marker: open ? '–' : '+',\n        toggle: () => this.toggleFaq(faq.id),\n      };\n    });\n\n    return {\n      heroRef: this.makeReveal('hero'),\n      servicesRef: this.makeReveal('services'),\n      diagRef: this.makeReveal('diag'),\n      teamRef: this.makeReveal('team'),\n\n      heroWrapStyle: { padding: '150px 60px 130px', background: '#37464D', position: 'relative', overflow: 'hidden' },\n      heroHeadlineStyle: {\n        fontFamily: \"'Archivo Black',sans-serif\", fontSize: 44, lineHeight: 1.18, margin: 0,\n        color: revealed.hero ? '#F0DCC9' : '#37464D',\n        WebkitTextStroke: revealed.hero ? '0px transparent' : '1.5px #F0DCC9',\n        transition: 'color 1s ease-out, -webkit-text-stroke .8s ease-out',\n      },\n      chipStyle0: chip('6%', '4%', -9, revealed.hero),\n      chipStyle1: chip('10%', '88%', 12, revealed.hero),\n      chipStyle2: chip('91%', '5%', 6, revealed.hero),\n      chipStyle3: chip('91%', '90%', -12, revealed.hero),\n\n      services,\n\n      socialRef: this.makeReveal('social'),\n      seguidoresNum: socialCounts.seguidores,\n      sesionesNum: socialCounts.sesiones,\n      mesesNum: socialCounts.meses,\n\n      symptoms,\n      ruidoLabel: `${ruidoPct}%`,\n      senalLabel: `${senalPct}%`,\n      ruidoBarStyle: { height: '100%', width: `${ruidoPct}%`, background: '#7B817F', borderRadius: 8, transition: 'width .5s ease-out' },\n      senalBarStyle: { height: '100%', width: `${senalPct}%`, background: '#F0DCC9', borderRadius: 8, transition: 'width .5s ease-out' },\n\n      comoRef: this.makeReveal('como'),\n      comoTextStyle,\n      circle1Style: circleStyle(p1),\n      circle2Style: circleStyle(p2),\n      circle3Style: circleStyle(p3),\n      arrow1Style: arrowStyle(pa1),\n      arrow2Style: arrowStyle(pa2),\n      step1Number: Math.round(1 * p1),\n      step2Number: Math.round(2 * p2),\n      step3Number: Math.round(3 * p3),\n\n      team,\n      faqs,\n      handleSubmit: (e) => this.handleSubmit(e),\n    };\n  }\n}\n\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
